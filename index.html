<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>SportMind - Seu chatbot de esportes</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <aside>

        <div class="logo">
            <img src="/imgs/sportmind-logo.png" alt="logo-SportMind">
        </div>

        <label for="input" class="new-chat">+ Nova conversa</label>

        <div class="conversations">

            <div class="chat-item">⚽ Futebol</div>
            <div class="chat-item">🏎️ Fórmula 1</div>
            <div class="chat-item">🏀 Basquete</div>
            <div class="chat-item">🎾 Tênis</div>
            <div class="chat-item">🥊 Artes Marciais</div>
            <div class="chat-item">🏋🏻‍♂️Musculação</div>

        </div>

        <!-- testando card de perfil -->
        <div class="profile-card">
            <img src="/imgs/perfil.png" alt="Perfil" class="profile-avatar">

            <div class="profile-info">
                <span class="profile-name">Matheus Eduardo</span>

                <div class="profile-status">
                    <span class="status-dot"></span>
                    <span>Online</span>
                </div>
            </div>
        </div>

    </aside>


    <main>

        <div class="chat-header">
            <h3>Seu chat sobre esportes...</h3>
            <div class="theme-toggle" id="themeToggle">
                <div class="toggle-track">
                    <div class="toggle-thumb"></div> <!-- pra mudar o tema-->
                </div>
            </div>
        </div>

        <div class="messages" id="messages">

            <div class="message bot">
                <img src="/imgs/bot.png" class="avatar">
                <div class="bubble">
                    Olá! Sou o SportBot. Pergunte algo sobre esportes!
                </div>
            </div>

        </div>

        <div class="input-area">

            <input id="input" placeholder="Pergunte sobre esportes...">

            <button onclick="sendMessage()">Enviar</button>

        </div>

    </main>


    <script src="scripts.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</body>

</html>
