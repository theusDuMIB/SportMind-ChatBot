<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>SportMind - Seu chatbot de esportes</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <aside>

        <div class="logo">🏆 SportMind</div>

        <button class="new-chat">+ Nova conversa</button>

        <div class="conversations">

            <div class="chat-item">⚽ Futebol</div>
            <div class="chat-item">🏎️ Fórmula 1</div>
            <div class="chat-item">🏀 Basquete</div>
            <div class="chat-item">🎾 Tênis</div>

        </div>

    </aside>


    <main>

        <div class="chat-header">
            Chat esportivo
        </div>

        <div class="messages" id="messages">

            <div class="message bot">
                Olá! Sou o SportBot. Pergunte algo sobre esportes!
            </div>

        </div>

        <div class="input-area">

            <input id="input" placeholder="Pergunte sobre esportes...">

            <button onclick="sendMessage()">Enviar</button>

        </div>

    </main>


    <script src="scripts.js" defer>



    </script>

</body>

</html>
